<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChocoBox Strategy Dashboard 2024</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #2c3e50; --danger: #e74c3c; --success: #27ae60; --blue: #3498db; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: var(--primary); line-height: 1.6; }
        .container { max-width: 1000px; margin: auto; }
        
        .header { background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 25px; text-align: center; }
        
        /* Стили симулятора */
        .simulator { background: #fff; padding: 25px; border-radius: 12px; border: 2px solid var(--blue); margin-bottom: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .slider-box { margin: 25px 0; text-align: center; }
        input[type=range] { width: 100%; cursor: pointer; height: 10px; accent-color: var(--blue); }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 10px; }
        .stat-card { background: #f8f9fa; padding: 20px; border-radius: 10px; text-align: center; border: 1px solid #eee; }
        .stat-card.critical { background: #fff5f5; border-color: var(--danger); color: var(--danger); }
        .val { font-size: 2rem; font-weight: bold; display: block; margin-top: 5px; }

        .card { background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 25px; }
        
        h2 { color: var(--primary); border-bottom: 2px solid var(--blue); padding-bottom: 10px; margin-top: 0; }
        h3 { color: var(--blue); margin-top: 25px; }
        ul, ol { padding-left: 20px; }
        li { margin-bottom: 10px; }
        
        .footer { text-align: center; font-size: 0.9rem; color: #7f8c8d; margin-top: 40px; padding-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 style="margin:0;">ChocoBox: Стратегический отчет 2024</h1>
        <p style="color: #7f8c8d;">Интерактивная панель финансового директора (CFO)</p>
    </div>

    <div class="simulator">
        <h2 style="border:none; text-align: center;">🛑 Стресс-тест: Устойчивость бизнеса</h2>
        <p style="text-align: center;">Двигайте ползунок, чтобы увидеть, как снижение выручки влияет на наличие денег в кассе:</p>
        
        <div class="slider-box">
            <label style="font-weight: bold; font-size: 1.2rem;">Снижение спроса: <span id="dropLabel" style="color: var(--danger);">0</span>%</label>
            <input type="range" id="crisisSlider" min="0" max="50" value="0">
        </div>

        <div class="grid">
            <div class="stat-card">
                <div>Прогнозная выручка (год)</div>
                <span id="newRev" class="val">606 000</span>
            </div>
            <div id="balanceCard" class="stat-card">
                <div>О
